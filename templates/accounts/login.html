<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HabitatOne </title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }

        .login-card {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        }

        .form-control {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: rgba(15, 23, 42, 0.8);
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
            color: #f8fafc;
        }

        .form-label {
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .btn-login {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .btn-login:hover {
            background-color: #1d4ed8;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .brand-subtitle {
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo"><i class="bi bi-building-fill text-info"></i> HabitatOne </div>
        <div class="brand-subtitle">Society Administration Portal</div>

        {% if form.errors %}
            <div class="alert alert-danger py-2 px-3 mb-4 text-xs border-0" style="background-color: rgba(220, 38, 38, 0.2); color: #fca5a5; border-radius: 8px;">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password.
            </div>
        {% endif %}

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info py-2 px-3 mb-4 text-xs border-0" style="background-color: rgba(59, 130, 246, 0.2); color: #93c5fd; border-radius: 8px;">
                    <i class="bi bi-info-circle-fill me-2"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" id="loginForm">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control" placeholder="Enter your username">
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" required id="id_password" class="form-control" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-login w-100 mt-2">Sign In</button>
        </form>

        <div class="mt-4 pt-3 border-top border-secondary border-opacity-25 text-center">
            <p class="text-xs text-muted mb-2">Recruiter Quick Access Demo Login:</p>
            <div class="row g-2">
                <div class="col-6">
                    <button type="button" onclick="loginDemo('admin', 'admin123')" class="btn btn-outline-info btn-sm w-100 fw-semibold text-xs py-2">
                        <i class="bi bi-shield-lock-fill me-1"></i> Demo Admin
                    </button>
                </div>
                <div class="col-6">
                    <button type="button" onclick="loginDemo('resident1', 'resident123')" class="btn btn-outline-light btn-sm w-100 fw-semibold text-xs py-2">
                        <i class="bi bi-person-fill me-1"></i> Demo Resident
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loginDemo(username, password) {
            document.getElementById('id_username').value = username;
            document.getElementById('id_password').value = password;
            document.getElementById('loginForm').submit();
        }
    </script>
</body>
</html>
